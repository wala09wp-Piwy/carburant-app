<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Saisie carburant</title>

<style>
body{margin:0;font-family:Arial;background:#f3f6fb;padding:16px}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 6px 18px #0001}
h1,h2{margin-top:0;color:#0a318f}
label{font-weight:bold;display:block;margin-top:10px}
input,button{width:100%;padding:12px;margin-top:5px;border-radius:10px;border:1px solid #ccc}
button{border:none;background:#0a318f;color:white;font-weight:bold;margin-top:14px}
.ok{background:#ecfdf3;color:#067647;padding:10px;border-radius:10px}
.err{background:#fef3f2;color:#b42318;padding:10px;border-radius:10px}
.info{background:#eef4ff;color:#0a318f;padding:10px;border-radius:10px}
.badge{display:inline-block;background:#eef4ff;color:#0a318f;padding:6px 10px;border-radius:999px;margin-top:8px}
</style>
</head>

<body>

<div class="card">
  <h1>⛽ Saisie carburant</h1>
  <div id="etat" class="info">Application prête.</div>
</div>

<div class="card">
  <h2>🚗 Véhicule</h2>

  <input id="vehiculeId" placeholder="ID véhicule (QR code)">

  <div id="vehiculeInfo"></div>

  <button onclick="saveVehicleId()">💾 Mémoriser véhicule</button>
</div>

<div class="card">
  <label>Date et heure</label>
  <input id="dateHeure">

  <label>Kilométrage total</label>
  <input id="kmTotal" type="number">

  <label>Kilomètres parcourus</label>
  <input id="kmParcouru" type="number">

  <label>Litrage</label>
  <input id="litrage" type="number">

  <label>Conso</label>
  <input id="conso" readonly>

  <button onclick="savePlein()">✅ Enregistrer</button>
  <button onclick="syncNow()">🔄 Synchroniser</button>
</div>

<div class="card">
  <h2>📦 En attente</h2>
  <div id="pending"></div>
</div>

<script>
const API_KEY = "7539b07533ae49b51e523a1fca961f710fda5640";
const DOC_ID = "cQjMJPmF91ep83Bp1MHPbW";
const API = "https://docs.getgrist.com/api/docs";

const $ = id => document.getElementById(id);

window.addEventListener("load", async () => {
  $("dateHeure").value = now();

  const id = new URLSearchParams(location.search).get("id");
  if (id) {
    await loadVehicle(id);
    setEtat("Véhicule chargé via QR", "ok");
  } else {
    loadStoredVehicle();
  }

  $("kmParcouru").addEventListener("input", calc);
  $("litrage").addEventListener("input", calc);

  updatePending();
});

function now(){
  const d=new Date();
  return d.toLocaleString("fr-FR");
}

function setEtat(msg,type="info"){
  $("etat").className=type;
  $("etat").textContent=msg;
}

function calc(){
  const km=$("kmParcouru").value;
  const l=$("litrage").value;
  $("conso").value = km && l ? ((l/km)*100).toFixed(2) : "";
}

function getQueue(){
  return JSON.parse(localStorage.getItem("q")||"[]");
}

function setQueue(q){
  localStorage.setItem("q",JSON.stringify(q));
  updatePending();
}

function updatePending(){
  $("pending").textContent = getQueue().length+" en attente";
}

async function loadVehicle(id){
  const res = await fetch(`${API}/${DOC_ID}/tables/Voiture/records/${id}`,{
    headers:{Authorization:`Bearer ${API_KEY}`}
  });

  const data = await res.json();

  const ticket = data.fields.Ticket_Voiture;

  localStorage.setItem("vehicule_id",id);
  localStorage.setItem("vehicule_ticket",ticket);

  showTicket(ticket);
}

function loadStoredVehicle(){
  const ticket = localStorage.getItem("vehicule_ticket");
  if (ticket) showTicket(ticket);
}

function saveVehicleId(){
  const id = $("vehiculeId").value;
  if(!id) return setEtat("ID requis","err");
  loadVehicle(id);
}

function showTicket(ticket){
  $("vehiculeInfo").innerHTML =
    `<span class="badge">${ticket}</span>`;
}

function savePlein(){
  const id = localStorage.getItem("vehicule_id");

  if(!id) return setEtat("Scanner QR","err");

  const q = getQueue();
  q.push({
    id:id,
    date:$("dateHeure").value,
    km:$("kmTotal").value,
    kmp:$("kmParcouru").value,
    l:$("litrage").value
  });

  setQueue(q);
  setEtat("Enregistré offline","ok");
}

async function syncNow(){
  const q = getQueue();

  if(!q.length) return setEtat("Rien à sync","ok");

  const rest=[];

  for(const e of q){
    try{
      await fetch(`${API}/${DOC_ID}/tables/Saisies/records`,{
        method:"POST",
        headers:{
          Authorization:`Bearer ${API_KEY}`,
          "Content-Type":"application/json"
        },
        body:JSON.stringify({
          records:[{
            fields:{
              Date_Heure_Saisie:e.date,
              "Véhicule_Saisie":Number(e.id),
              Km_Total_Saisie:Number(e.km),
              Km_Parcouru_Saisie:Number(e.kmp),
              Litrage_Saisie:Number(e.l)
            }
          }]
        })
      });
    }catch{
      rest.push(e);
    }
  }

  setQueue(rest);

  setEtat(rest.length?"Sync partielle":"Sync OK",rest.length?"err":"ok");
}
</script>

</body>
</html>
