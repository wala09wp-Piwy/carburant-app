<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Saisie carburant</title>
<link rel="manifest" href="manifest.json">
<style>
body{margin:0;font-family:Arial;background:#f3f6fb;color:#1d2433;padding:16px}
.card{background:white;border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 6px 18px #0001}
h1{margin-top:0;color:#0a318f}
label{font-weight:bold;display:block;margin-top:10px}
input,select,button{width:100%;padding:12px;margin-top:5px;border-radius:10px;border:1px solid #ccc;font-size:16px}
button{border:none;background:#0a318f;color:white;font-weight:bold;margin-top:14px}
.ok{background:#ecfdf3;color:#067647;padding:10px;border-radius:10px}
.err{background:#fef3f2;color:#b42318;padding:10px;border-radius:10px}
.info{background:#eef4ff;color:#0a318f;padding:10px;border-radius:10px}
.small{font-size:13px;color:#667085}
</style>
</head>

<body>

<div class="card">
  <h1>⛽ Saisie carburant</h1>
  <div id="etat" class="info">Chargement...</div>
</div>

<div class="card">
  <label>Clé API Grist</label>
  <input id="apiKey" type="password" placeholder="Coller la clé API Grist">

  <label>Véhicule / Ticket</label>
  <input id="vehicule" placeholder="Ex : VL01">

  <label>Date et heure</label>
  <input id="dateHeure">

  <label>Kilométrage total</label>
  <input id="kmTotal" type="number">

  <label>Kilomètres parcourus</label>
  <input id="kmParcouru" type="number">

  <label>Litrage</label>
  <input id="litrage" type="number" step="0.01">

  <label>Conso moyenne L/100</label>
  <input id="conso" readonly>

  <button onclick="savePlein()">✅ Enregistrer</button>
  <button onclick="syncNow()">🔄 Synchroniser maintenant</button>

  <p class="small">
    Si le téléphone est hors ligne, la saisie est gardée en mémoire puis envoyée automatiquement au retour du réseau.
  </p>
</div>

<div class="card">
  <h2>📦 En attente</h2>
  <div id="pending">0 saisie en attente</div>
</div>

<script>
const DOC_ID = "cQjMJPmF91ep";
const TABLE_SAISIES = "Saisies";
const API_BASE = "https://docs.getgrist.com/api/docs";

const $ = id => document.getElementById(id);

window.addEventListener("load", () => {
  $("dateHeure").value = nowFr();

  const savedKey = localStorage.getItem("grist_api_key") || "";
  $("apiKey").value = savedKey;

  const vehiculeQr = new URLSearchParams(location.search).get("vehicule");
  if (vehiculeQr) $("vehicule").value = vehiculeQr;

  updatePending();
  updateConso();

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
  }

  if (navigator.onLine) syncNow(false);
});

window.addEventListener("online", () => syncNow(false));

$("kmParcouru").addEventListener("input", updateConso);
$("litrage").addEventListener("input", updateConso);
$("apiKey").addEventListener("change", () => {
  localStorage.setItem("grist_api_key", $("apiKey").value.trim());
});

function nowFr(){
  const d = new Date();
  const p = n => String(n).padStart(2,"0");
  return `${p(d.getDate())}/${p(d.getMonth()+1)}/${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

function num(v){
  const n = Number(String(v || "").replace(",", "."));
  return Number.isFinite(n) ? n : null;
}

function updateConso(){
  const km = num($("kmParcouru").value);
  const litres = num($("litrage").value);

  $("conso").value = km && litres ? ((litres / km) * 100).toFixed(2) : "";
}

function getQueue(){
  return JSON.parse(localStorage.getItem("pleins_offline") || "[]");
}

function setQueue(list){
  localStorage.setItem("pleins_offline", JSON.stringify(list));
  updatePending();
}

function updatePending(){
  const count = getQueue().length;
  $("pending").textContent = count + " saisie" + (count > 1 ? "s" : "") + " en attente";
}

function setEtat(msg, type="info"){
  $("etat").className = type;
  $("etat").textContent = msg;
}

function savePlein(){
  const apiKey = $("apiKey").value.trim();
  if (!apiKey) return setEtat("Veuillez renseigner la clé API Grist.", "err");

  localStorage.setItem("grist_api_key", apiKey);

  const data = {
    uid: crypto.randomUUID(),
    dateHeure: $("dateHeure").value || nowFr(),
    vehicule: $("vehicule").value.trim(),
    kmTotal: num($("kmTotal").value),
    kmParcouru: num($("kmParcouru").value),
    litrage: num($("litrage").value),
    conso: num($("conso").value)
  };

  if (!data.vehicule) return setEtat("Veuillez saisir le véhicule ou le ticket.", "err");
  if (!data.kmTotal) return setEtat("Veuillez saisir le kilométrage total.", "err");
  if (!data.litrage) return setEtat("Veuillez saisir le litrage.", "err");

  const queue = getQueue();
  queue.push(data);
  setQueue(queue);

  $("dateHeure").value = nowFr();
  $("kmTotal").value = "";
  $("kmParcouru").value = "";
  $("litrage").value = "";
  $("conso").value = "";

  setEtat("Saisie enregistrée sur le téléphone.", "ok");

  if (navigator.onLine) syncNow(false);
}

async function syncNow(showMessage=true){
  const apiKey = localStorage.getItem("grist_api_key") || $("apiKey").value.trim();
  const queue = getQueue();

  if (!apiKey) {
    if (showMessage) setEtat("Clé API Grist manquante.", "err");
    return;
  }

  if (!queue.length) {
    if (showMessage) setEtat("Aucune saisie à synchroniser.", "ok");
    return;
  }

  if (!navigator.onLine) {
    setEtat("Hors ligne : synchronisation impossible pour le moment.", "info");
    return;
  }

  try {
    setEtat("Synchronisation en cours...", "info");

    const records = queue.map(p => ({
      fields: {
        Date_Heure_Saisie: p.dateHeure,
        "Véhicule_Saisie": p.vehicule,
        Km_Total_Saisie: p.kmTotal,
        Km_Parcouru_Saisie: p.kmParcouru,
        Litrage_Saisie: p.litrage,
        Conso_Moyenne_Derniere_Saisie: p.conso
      }
    }));

    const res = await fetch(`${API_BASE}/${DOC_ID}/tables/${TABLE_SAISIES}/records`, {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${apiKey}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({records})
    });

    if (!res.ok) {
      const txt = await res.text();
      throw new Error(txt);
    }

    setQueue([]);
    setEtat("Synchronisation réussie.", "ok");

  } catch (e) {
    console.error(e);
    setEtat("Erreur de synchronisation. Les saisies restent en attente.", "err");
  }
}
</script>

</body>
</html>
