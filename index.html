<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Saisie carburant</title>

<style>
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f3f6fb;color:#1d2433;padding:16px}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 6px 18px #0001}
h1,h2{margin-top:0;color:#0a318f}
label{font-weight:bold;display:block;margin-top:10px}
input,button{width:100%;padding:12px;margin-top:5px;border-radius:10px;border:1px solid #ccc;font-size:16px;box-sizing:border-box}
button{border:none;background:#0a318f;color:white;font-weight:bold;margin-top:14px}
button.secondary{background:#475467}
button.success{background:#067647}
.ok{background:#ecfdf3;color:#067647;padding:10px;border-radius:10px}
.err{background:#fef3f2;color:#b42318;padding:10px;border-radius:10px}
.info{background:#eef4ff;color:#0a318f;padding:10px;border-radius:10px}
.hidden{display:none}
.small{font-size:13px;color:#667085}
</style>
</head>

<body>

<div class="card">
  <h1>⛽ Saisie carburant</h1>
  <div id="etat" class="info">Application prête.</div>
</div>

<div class="card">
  <button onclick="showPage('saisie')">⛽ Saisie carburant</button>
  <button class="secondary" onclick="showPage('vehicule')">➕ Ajouter un véhicule</button>
  <button class="success" onclick="syncNow()">🔄 Synchroniser maintenant</button>
</div>

<section id="pageSaisie">
  <div class="card">
    <h2>🚗 Véhicule</h2>

    <label>Véhicule / Ticket</label>
    <input id="vehicule" placeholder="Ex : VL01">

    <label>Date et heure</label>
    <input id="dateHeure">

    <label>Kilométrage total</label>
    <input id="kmTotal" type="number" placeholder="Ex : 125000">

    <label>Kilomètres parcourus</label>
    <input id="kmParcouru" type="number" placeholder="Ex : 520">

    <label>Litrage</label>
    <input id="litrage" type="number" step="0.01" placeholder="Ex : 42.50">

    <label>Conso moyenne L/100</label>
    <input id="conso" readonly placeholder="Calcul automatique non enregistré">

    <button onclick="savePlein()">✅ Enregistrer la saisie</button>

    <p class="small">
      La conso est affichée pour contrôle, mais elle n’est pas envoyée dans Grist.
    </p>
  </div>
</section>

<section id="pageVehicule" class="hidden">
  <div class="card">
    <h2>➕ Ajouter un véhicule</h2>

    <label>Ticket véhicule</label>
    <input id="newTicket" placeholder="Ex : VL01">

    <label>Marque</label>
    <input id="newMarque" placeholder="Ex : PEUGEOT">

    <label>Modèle</label>
    <input id="newModele" placeholder="Ex : 308 SW">

    <label>Immatriculation</label>
    <input id="newImmat" placeholder="Ex : AB-123-CD">

    <label>Kilométrage actuel</label>
    <input id="newKm" type="number" placeholder="Ex : 125000">

    <button onclick="saveVehicule()">🚗 Enregistrer le véhicule</button>
    <button class="secondary" onclick="showPage('saisie')">⬅ Retour à la saisie</button>
  </div>
</section>

<div class="card">
  <h2>📦 En attente</h2>
  <div id="pending">0 élément en attente</div>
</div>

<script>
const GRIST_API_KEY = "7d88082dedcbf1dcb57646fdb833ec3d59900a3";
const DOC_ID = "cQjMJPmF91ep83Bp1MHPbW";

const TABLE_SAISIES = "Saisies";
const TABLE_VOITURE = "Voiture";
const API_BASE = "https://docs.getgrist.com/api/docs";

const $ = id => document.getElementById(id);

window.addEventListener("load", () => {
  $("dateHeure").value = nowFr();

  const vehiculeQr = new URLSearchParams(location.search).get("vehicule");
  if (vehiculeQr) $("vehicule").value = vehiculeQr;

  $("kmParcouru").addEventListener("input", updateConso);
  $("litrage").addEventListener("input", updateConso);

  updatePending();

  if (navigator.onLine) syncNow(false);
});

window.addEventListener("online", () => syncNow(false));

function showPage(page){
  $("pageSaisie").classList.toggle("hidden", page !== "saisie");
  $("pageVehicule").classList.toggle("hidden", page !== "vehicule");
}

function nowFr(){
  const d = new Date();
  const p = n => String(n).padStart(2,"0");
  return `${p(d.getDate())}/${p(d.getMonth()+1)}/${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

function num(v){
  const n = Number(String(v || "").replace(",", "."));
  return Number.isFinite(n) ? n : null;
}

function setEtat(msg, type="info"){
  $("etat").className = type;
  $("etat").textContent = msg;
}

function updateConso(){
  const km = num($("kmParcouru").value);
  const litres = num($("litrage").value);
  $("conso").value = km && litres ? ((litres / km) * 100).toFixed(2) : "";
}

function getQueue(){
  return JSON.parse(localStorage.getItem("grist_queue") || "[]");
}

function setQueue(list){
  localStorage.setItem("grist_queue", JSON.stringify(list));
  updatePending();
}

function updatePending(){
  const count = getQueue().length;
  $("pending").textContent = count + " élément" + (count > 1 ? "s" : "") + " en attente";
}

function resetSaisie(){
  $("dateHeure").value = nowFr();
  $("kmTotal").value = "";
  $("kmParcouru").value = "";
  $("litrage").value = "";
  $("conso").value = "";
}

function resetVehicule(){
  $("newTicket").value = "";
  $("newMarque").value = "";
  $("newModele").value = "";
  $("newImmat").value = "";
  $("newKm").value = "";
}

function savePlein(){
  const data = {
    type: "saisie",
    uid: crypto.randomUUID(),
    dateHeure: $("dateHeure").value || nowFr(),
    vehicule: $("vehicule").value.trim(),
    kmTotal: num($("kmTotal").value),
    kmParcouru: num($("kmParcouru").value),
    litrage: num($("litrage").value)
  };

  if (!data.vehicule) return setEtat("Veuillez saisir le véhicule.", "err");
  if (!data.kmTotal) return setEtat("Veuillez saisir le kilométrage total.", "err");
  if (!data.litrage) return setEtat("Veuillez saisir le litrage.", "err");

  const queue = getQueue();
  queue.push(data);
  setQueue(queue);

  resetSaisie();
  setEtat("Saisie carburant enregistrée sur le téléphone.", "ok");

  if (navigator.onLine) syncNow(false);
}

function saveVehicule(){
  const modeleRaw = $("newModele").value.trim();

  const data = {
    type: "vehicule",
    uid: crypto.randomUUID(),
    ticket: $("newTicket").value.trim().toUpperCase(),
    marque: $("newMarque").value.trim().toUpperCase(),
    modele: modeleRaw ? modeleRaw.charAt(0).toUpperCase() + modeleRaw.slice(1) : "",
    immat: $("newImmat").value.trim().toUpperCase(),
    km: num($("newKm").value)
  };

  if (!data.ticket) return setEtat("Veuillez saisir le ticket véhicule.", "err");
  if (!data.marque) return setEtat("Veuillez saisir la marque.", "err");
  if (!data.modele) return setEtat("Veuillez saisir le modèle.", "err");
  if (!data.immat) return setEtat("Veuillez saisir l’immatriculation.", "err");

  const queue = getQueue();
  queue.push(data);
  setQueue(queue);

  $("vehicule").value = data.ticket;

  resetVehicule();
  showPage("saisie");
  setEtat("Véhicule enregistré sur le téléphone.", "ok");

  if (navigator.onLine) syncNow(false);
}

async function syncNow(showMessage = true){
  const queue = getQueue();

  if (!queue.length) {
    if (showMessage) setEtat("Aucun élément à synchroniser.", "ok");
    return;
  }

  if (!navigator.onLine) {
    setEtat("Hors ligne : synchronisation impossible pour le moment.", "info");
    return;
  }

  try {
    setEtat("Synchronisation en cours...", "info");

    const restants = [];

    for (const item of queue) {
      try {
        if (item.type === "saisie") {
          await sendToGrist(TABLE_SAISIES, {
            Date_Heure_Saisie: item.dateHeure,
            "Véhicule_Saisie": item.vehicule,
            Km_Total_Saisie: item.kmTotal,
            Km_Parcouru_Saisie: item.kmParcouru,
            Litrage_Saisie: item.litrage,
            UID_Saisie: item.uid
          });
        }

        if (item.type === "vehicule") {
          await sendToGrist(TABLE_VOITURE, {
            Ticket_Voiture: item.ticket,
            Marque_Voiture: item.marque,
            Modele_Voiture: item.modele,
            Immatriculation_Voiture: item.immat,
            Kilometrage_Voiture: item.km
          });
        }

      } catch (e) {
        console.error(e);
        restants.push(item);
      }
    }

    setQueue(restants);

    if (restants.length) {
      setEtat("Synchronisation partielle : certains éléments restent en attente.", "err");
    } else {
      setEtat("Synchronisation réussie.", "ok");
    }

  } catch (e) {
    console.error(e);
    setEtat("Erreur de synchronisation. Les données restent en attente.", "err");
  }
}

async function sendToGrist(table, fields){
  const res = await fetch(`${API_BASE}/${DOC_ID}/tables/${table}/records`, {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${GRIST_API_KEY}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      records: [{ fields }]
    })
  });

  if (!res.ok) {
    const txt = await res.text();
    throw new Error(txt);
  }

  return res.json();
}
</script>

</body>
</html>
